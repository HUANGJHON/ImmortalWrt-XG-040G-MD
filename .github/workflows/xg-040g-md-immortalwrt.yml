name: Build_XG_040G_MD-immortalwrt

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: "指定Git提交哈希(留空默认使用最新提交)"
        required: false
        type: string
      patch_type:
        description: "选择补丁版本"
        required: true
        default: "patch-bingoguo93"
        type: choice
        options:
          - patch-bingoguo93
          - patch-xiangtailiang
  schedule:
    - cron: '0 16 * * *' # 每天北京时间 0 点 (UTC 16:00)

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-25.12
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore last commit cache
        uses: actions/cache@v4
        with:
          path: last_commit.txt
          key: last-commit-${{ github.workflow }}
          restore-keys: last-commit-

      - name: Check remote branch for new commits
        id: check_commit
        run: |
          LATEST_COMMIT=$(git ls-remote ${{ env.REPO_URL }} ${{ env.REPO_BRANCH }} | awk '{print $1}')
          CACHED_COMMIT=$(cat last_commit.txt 2>/dev/null || echo "")
          
          if [[ "${{ github.event_name }}" == "schedule" && "$LATEST_COMMIT" == "$CACHED_COMMIT" ]]; then
            echo "status=skip" >> $GITHUB_OUTPUT
          else
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "$LATEST_COMMIT" > last_commit.txt
          fi

      - name: Free Disk Space
        if: steps.check_commit.outputs.status == 'ok'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: Setup environment dependencies
        if: steps.check_commit.outputs.status == 'ok'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools python3-dev rsync swig unzip libpython3-dev \
            zlib1g-dev file wget squashfs-tools mkbootimg device-tree-compiler
          sudo timedatectl set-timezone "${{ env.TZ }}"

      - name: Clone Source
        if: steps.check_commit.outputs.status == 'ok'
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          cd openwrt
          if [ -n "${{ inputs.commit_hash }}" ]; then
            git fetch --depth 1 origin ${{ inputs.commit_hash }}
            git checkout ${{ inputs.commit_hash }}
          fi
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          # 生成精确到秒的 Release Tag
          echo "RELEASE_TAG=$(date +"%Y.%m.%d-%H%M%S")" >> $GITHUB_ENV

      - name: Apply Patch & Update Feeds
        if: steps.check_commit.outputs.status == 'ok'
        working-directory: ./openwrt
        run: |
          SELECTED_PATCH=${{ inputs.patch_type || 'patch-bingoguo93' }}
          if [ -d "../$SELECTED_PATCH" ]; then
            cp -r ../$SELECTED_PATCH/* .
            [ -f patch.sh ] && chmod +x patch.sh && ./patch.sh
          fi
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configuration & Download
        if: steps.check_commit.outputs.status == 'ok'
        run: |
          [ -f "${CONFIG_FILE}" ] && cp -f "${CONFIG_FILE}" openwrt/.config
          cd openwrt
          make defconfig
          make download -j$(nproc)

      - name: Compile OpenWrt
        if: steps.check_commit.outputs.status == 'ok'
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Organize Artifacts
        if: steps.check_commit.outputs.status == 'ok'
        run: |
          mkdir -p bin_out
          cp -r openwrt/bin/targets/*/*/* bin_out/ || true
          rm -f bin_out/Packages* bin_out/config.buildinfo bin_out/feeds.buildinfo

      - name: Publish GitHub Release
        if: steps.check_commit.outputs.status == 'ok' && env.UPLOAD_RELEASE == 'true'
        uses: ncipollo/release-action@v1
        with:
          # 使用精确到秒的变量
          tag: ${{ env.RELEASE_TAG }}
          artifacts: "bin_out/*"
          allowUpdates: true
          replacesArtifacts: true
          body: |
            🚀 XG-040G-MD 固件自动构建
            ----------------------
            源码分支: ${{ env.REPO_BRANCH }}
            提交哈希: ${{ env.COMMIT_HASH }}
            构建时间: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Save commit hash to cache
        if: steps.check_commit.outputs.status == 'ok' && success()
        uses: actions/cache/save@v4
        with:
          path: last_commit.txt
          key: last-commit-${{ github.workflow }}-${{ github.run_id }}
